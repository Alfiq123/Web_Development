<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum Web 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous"
    >
    <style>
        button {
            width: 100px;
        }
    </style>
</head>
<body>

    <!-- Versi Standar -->
    <form class="d-flex justify-content-center align-items-center vh-100">
        <div>

            <!-- Nama -->
            <div class="form-group">
                <label for="nama">Nama</label> <br>
                <input type="text" name="nama" id="nama" placeholder="Nama">
            </div>

            <br>

            <!-- Alamat -->
            <div class="form-group">
                <label for="alamat">Alamat</label> <br>
                <input type="text" name="alamat" id="alamat" placeholder="Alamat">
            </div>

            <br>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label> <br>
                <input type="email" name="email" id="email" placeholder="Email">
            </div>

            <br>

            <!-- Nomor Telepon -->
            <div class="form-group">
                <label for="telepon">Telepon</label> <br>
                <input type="tel" name="telepon" id="telepon" placeholder="Telepon" pattern="(62)[0-9]{5,20}">
            </div>

            <br>

            <!-- Tombol-Tombol -->
            <button type="button" class="btn btn-success border border-dark border-1">Simpan</button>
            <button type="button" class="btn btn-warning border border-dark border-1">Batal</button>

        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>

</html>
