<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum Web 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous"
    >
    <style>
        button { width: 100px; }
    </style>
</head>
<body>

<form class="container">

    <!-- Nama -->
    <div class="row form-group">
        <label for="nama" class="col-12 col-md-2 col-form-label">Nama</label>
        <div class="col-12 col-md-9">
            <input type="text" name="nama" id="nama" placeholder="Nama">
        </div>
    </div>

    <!-- Alamat -->
    <div class="row form-group">
        <label for="alamat" class="col-12 col-md-2 col-form-label">Alamat</label>
        <div class="col-12 col-md-9">
            <input type="text" name="alamat" id="alamat" placeholder="Alamat">
        </div>
    </div>

    <!-- Email -->
    <div class="row form-group">
        <label for="email" class="col-12 col-md-2 col-form-label">Email</label>
        <div class="col-12 col-md-9">
            <input type="email" name="email" id="email" placeholder="Email">
        </div>
    </div>

    <!-- Nomor Telepon -->
    <div class="row form-group">
        <label for="telepon" class="col-12 col-md-2 col-form-label">Telepon</label>
        <div class="col-12 col-md-9">
            <input type="tel" name="telepon" id="telepon" placeholder="Telepon" pattern="(62)[0-9]{5,20}">
        </div>
    </div>

    <!-- Tombol Simpan & Batal -->
    <div class="row mt-2">
        <div class="col-12 col-md-9 offset-md-2">
            <button type="button" class="btn btn-success border border-dark border-1">Simpan</button>
            <button type="button" class="btn btn-warning border border-dark border-1">Batal</button>
        </div>
    </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
</script>

</body>

</html>
